;==============================================================================
; pjsip.conf  -  Clínica Regional "Salud Integral"
; Sistema de Confirmación Automática de Citas Médicas (EFT CUY5132)
; Asterisk 18 / chan_pjsip
;
; La PBX vive en subred privada (172.31.57.229) y NO se expone a Internet.
; El registro y la señalización SIP entran exclusivamente desde el SBC
; (Kamailio, 172.31.57.212), que es el único host autorizado por el
; Security Group SG-PBX-Seguro.
;==============================================================================

;------------------------------------------------------------------------------
; Transportes
;------------------------------------------------------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; La IP pública se reescribe en contactos para NAT (la fija el SBC al relayar)
local_net=172.31.0.0/16

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

;------------------------------------------------------------------------------
; Plantillas comunes
;------------------------------------------------------------------------------
[endpoint-interno](!)
type=endpoint
context=internal
disallow=all
allow=ulaw,alaw,gsm
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=auto
language=es

[aor-single](!)
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

[auth-userpass](!)
type=auth
auth_type=userpass

;------------------------------------------------------------------------------
; Extensión 3001  -  Sistema de Confirmación (origina las llamadas automáticas)
;------------------------------------------------------------------------------
[3001](endpoint-interno)
auth=3001-auth
aors=3001
callerid=Sistema Citas <3001>

[3001](aor-single)

[3001-auth](auth-userpass)
username=3001
password=Clinica.3001

;------------------------------------------------------------------------------
; Extensión 3002  -  Paciente / Softphone de prueba 1
;------------------------------------------------------------------------------
[3002](endpoint-interno)
auth=3002-auth
aors=3002
callerid=Paciente Prueba <3002>

[3002](aor-single)

[3002-auth](auth-userpass)
username=3002
password=Clinica.3002

;------------------------------------------------------------------------------
; Extensión 3003  -  Paciente / Softphone de prueba 2 (Recepción)
;------------------------------------------------------------------------------
[3003](endpoint-interno)
auth=3003-auth
aors=3003
callerid=Recepcion Clinica <3003>

[3003](aor-single)

[3003-auth](auth-userpass)
username=3003
password=Clinica.3003
