;==============================================================================
; extensions.conf  -  Clínica Regional "Salud Integral"
; Plan de marcado del Sistema de Confirmación Automática de Citas (EFT CUY5132)
;==============================================================================

[globals]
AGI_CONFIRMA=confirma_cita.py

;------------------------------------------------------------------------------
; Contexto interno: registro de extensiones y llamadas internas
;------------------------------------------------------------------------------
[internal]
; --- Llamadas internas entre extensiones 3001-3003 ---
exten => _300X,1,NoOp(Llamada interna ${CALLERID(num)} -> ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; --- 800: el paciente llama para confirmar su propia cita (entrada) ---
; La clave de búsqueda es el número del llamante (su extensión = su ficha).
exten => 800,1,NoOp(=== Servicio de Confirmacion de Citas: ${CALLERID(num)} ===)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(${AGI_CONFIRMA},${CALLERID(num)})
 same => n,Hangup()

;------------------------------------------------------------------------------
; Contexto de campaña saliente: el sistema LLAMA al paciente automáticamente
; Uso:
;   asterisk -rx "channel originate PJSIP/3002 extension 3002@citas"
; El ${EXTEN} marcado identifica la ficha del paciente a confirmar.
;------------------------------------------------------------------------------
[citas]
exten => _XXXX,1,NoOp(=== Llamada automatica de confirmacion a paciente ${EXTEN} ===)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(${AGI_CONFIRMA},${EXTEN})
 same => n,Hangup()

;------------------------------------------------------------------------------
; Banco de pruebas: simula al paciente que responde con una tecla DTMF.
; Permite validar de forma reproducible la captura de DTMF del AGI sin
; intervención manual. El dígito se entrega en la variable global DIGITO.
;   asterisk -rx "dialplan set global DIGITO 1"
;   asterisk -rx "channel originate Local/3002@sim-paciente extension 3002@citas"
;------------------------------------------------------------------------------
[sim-paciente]
exten => _XXXX,1,NoOp(Paciente simulado ${EXTEN} responde DTMF=${DIGITO})
 same => n,Answer()
 same => n,Wait(4)
 same => n,SendDTMF(${DIGITO})
 same => n,Wait(8)
 same => n,Hangup()
