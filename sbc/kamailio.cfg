#!KAMAILIO

# Global parameters
debug=2
log_stderror=1
fork=yes
children=4
enable_tls=1

listen=udp:172.31.57.212:5060
listen=tcp:172.31.57.212:5060
listen=tls:172.31.57.212:5061

# Modules
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "tls.so"

# Module parameters
modparam("tls", "private_key", "/etc/kamailio/tls/server.key")
modparam("tls", "certificate", "/etc/kamailio/tls/server.crt")
modparam("tls", "ca_list", "/etc/kamailio/tls/server.crt")
modparam("tls", "verify_certificate", 0)
modparam("tls", "require_certificate", 0)
modparam("tls", "tls_method", "TLSv1.2+")

modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# Main routing logic - proxy transparente hacia PBX
request_route {
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check("1511", "7")) {
        xlog("L_ERR", "Invalid request from $si\n");
        exit;
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) { t_relay(); }
        exit;
    }

    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Manejo de rutas existentes (in-dialog)
    if (loose_route()) {
        if (!t_relay()) { sl_reply_error(); }
        exit;
    }

    # Agregar Record-Route para permanecer en el path (ocultamiento topologia)
    record_route();

    # Reenviar todo hacia PBX privada (topologia oculta)
    $du = "sip:172.31.57.229:5060";

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    # Ocultar IP privada de PBX en Contact de respuestas
    if (search("Contact:.*172\.31\.57\.229")) {
        subst("/172\.31\.57\.229/54.196.193.57/g");
    }
}
